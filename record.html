<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Room</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a0a0a;
            font-family: 'DM Mono', monospace;
            color: #d4a843;
            min-height: 100vh;
            overflow-x: hidden;
            user-select: none;
        }

        .room {
            background:
                radial-gradient(ellipse at 50% 0%, #3d0d0d 0%, #1a0505 40%, #0d0202 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .room::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                repeating-linear-gradient(45deg, transparent, transparent 28px, rgba(180, 60, 0, 0.03) 28px, rgba(180, 60, 0, 0.03) 30px),
                repeating-linear-gradient(-45deg, transparent, transparent 28px, rgba(180, 60, 0, 0.03) 28px, rgba(180, 60, 0, 0.03) 30px);
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px 20px;
            border-bottom: 1px solid rgba(212, 168, 67, 0.2);
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            letter-spacing: 2px;
            color: #f0c84a;
            text-shadow: 0 0 20px rgba(240, 200, 74, 0.3);
        }

        .logo span {
            color: #c0392b;
        }

        .main-area {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            max-width: 1100px;
            margin: 0 auto;
        }

        .shelf-section {
            flex: 0 0 260px;
        }

        .shelf-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(212, 168, 67, 0.5);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .shelf {
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 168, 67, 0.1);
            border-radius: 8px;
            padding: 16px;
            position: relative;
        }

        .shelf::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #5c3a1e, #8b5e3c, #5c3a1e);
            border-radius: 0 0 8px 8px;
        }

        .record-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            background: rgba(20, 6, 6, 0.8);
            border: 1px solid rgba(212, 168, 67, 0.15);
            border-radius: 6px;
            cursor: grab;
            transition: all 0.2s;
            position: relative;
        }

        .record-card:hover {
            border-color: rgba(212, 168, 67, 0.5);
            background: rgba(40, 10, 10, 0.9);
            transform: translateX(4px);
        }

        .record-card.dragging {
            opacity: 0.4;
            transform: scale(0.95);
        }

        .record-card.playing-card {
            border-color: rgba(212, 168, 67, 0.6);
            background: rgba(60, 20, 10, 0.9);
        }

        .mini-vinyl {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mini-vinyl svg {
            width: 42px;
            height: 42px;
            border-radius: 50%;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 12px;
            color: #e8c97a;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-artist {
            font-size: 10px;
            color: rgba(212, 168, 67, 0.5);
            margin-top: 2px;
        }

        .card-duration {
            font-size: 10px;
            color: rgba(212, 168, 67, 0.4);
        }

        .drag-hint {
            text-align: center;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(212, 168, 67, 0.3);
            margin-top: 8px;
        }

        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .drop-zone {
            width: 100%;
            max-width: 520px;
            aspect-ratio: 1;
            border-radius: 12px;
            background: rgba(8, 2, 2, 0.9);
            border: 2px dashed rgba(212, 168, 67, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: border-color 0.3s, background 0.3s;
            overflow: hidden;
        }

        .drop-zone.drag-over {
            border-color: rgba(212, 168, 67, 0.7);
            background: rgba(30, 10, 5, 0.95);
            box-shadow: 0 0 30px rgba(212, 168, 67, 0.1);
        }

        .drop-zone.has-record {
            border-style: solid;
            border-color: rgba(212, 168, 67, 0.15);
        }

        .turntable-body {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .platter {
            width: 62%;
            height: 62%;
            border-radius: 50%;
            background: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 50%, #0f0f0f 100%);
            border: 3px solid #333;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.8), 0 4px 20px rgba(0, 0, 0, 0.6);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .platter::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: repeating-conic-gradient(rgba(255, 255, 255, 0.02) 0deg 1deg, transparent 1deg 3deg);
        }

        .vinyl-on-platter {
            width: 88%;
            height: 88%;
            border-radius: 50%;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vinyl-on-platter svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        .vinyl-on-platter.spinning {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .empty-platter-text {
            position: absolute;
            text-align: center;
            pointer-events: none;
        }

        .empty-platter-text .arrow {
            font-size: 28px;
            color: rgba(212, 168, 67, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        .empty-platter-text p {
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(212, 168, 67, 0.25);
            margin-top: 8px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        .tonearm-container {
            position: absolute;
            top: 8%;
            right: 10%;
            width: 30%;
            height: 50%;
            pointer-events: none;
            transform-origin: 80% 10%;
            transition: transform 0.8s ease-in-out;
        }

        .tonearm-container.arm-playing {
            transform: rotate(-22deg);
        }

        .tonearm-container.arm-idle {
            transform: rotate(0deg);
        }

        .spindle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, #888 0%, #444 100%);
            border: 1px solid #222;
            position: absolute;
            z-index: 2;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        }

        .screw {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle, #777 0%, #444 100%);
            border: 1px solid #222;
        }

        .speed-badge {
            position: absolute;
            bottom: 12%;
            left: 8%;
            display: flex;
            gap: 6px;
        }

        .speed-btn {
            font-size: 9px;
            color: rgba(212, 168, 67, 0.4);
            border: 1px solid rgba(212, 168, 67, 0.2);
            border-radius: 3px;
            padding: 3px 7px;
            cursor: pointer;
            background: none;
            font-family: 'DM Mono', monospace;
            transition: all 0.2s;
        }

        .speed-btn.active {
            color: #d4a843;
            border-color: rgba(212, 168, 67, 0.7);
            background: rgba(212, 168, 67, 0.1);
        }

        .controls {
            width: 100%;
            max-width: 520px;
            background: rgba(8, 2, 2, 0.8);
            border: 1px solid rgba(212, 168, 67, 0.1);
            border-radius: 8px;
            padding: 18px 20px;
        }

        .now-playing {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .np-label {
            font-size: 9px;
            letter-spacing: 3px;
            color: rgba(212, 168, 67, 0.4);
            text-transform: uppercase;
        }

        .np-title {
            font-size: 15px;
            color: #f0c84a;
            font-family: 'Playfair Display', serif;
            margin-top: 3px;
        }

        .np-artist {
            font-size: 10px;
            color: rgba(212, 168, 67, 0.6);
            margin-top: 2px;
        }

        .np-badge {
            font-size: 9px;
            padding: 3px 8px;
            border: 1px solid rgba(192, 57, 43, 0.5);
            color: rgba(192, 57, 43, 0.8);
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .np-badge.playing {
            color: #c0392b;
            border-color: #c0392b;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(212, 168, 67, 0.15);
            border-radius: 2px;
            margin-bottom: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c0392b, #d4a843);
            border-radius: 2px;
            transition: width 1s linear;
        }

        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: rgba(212, 168, 67, 0.4);
            margin-bottom: 14px;
        }

        .playback-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(212, 168, 67, 0.5);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 50%;
        }

        .ctrl-btn:hover {
            color: #d4a843;
        }

        .ctrl-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .ctrl-btn.primary {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(212, 168, 67, 0.4);
            color: #d4a843;
            font-size: 18px;
        }

        .ctrl-btn.primary:hover {
            background: rgba(212, 168, 67, 0.1);
            border-color: #d4a843;
        }

        .vol-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(212, 168, 67, 0.08);
        }

        .vol-label {
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(212, 168, 67, 0.4);
            width: 30px;
        }

        .vol-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 2px;
            background: rgba(212, 168, 67, 0.2);
            border-radius: 2px;
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #d4a843;
            cursor: pointer;
        }

        .drop-overlay {
            position: absolute;
            inset: 0;
            background: rgba(212, 168, 67, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .drop-zone.drag-over .drop-overlay {
            opacity: 1;
        }

        .drop-overlay-text {
            font-size: 13px;
            letter-spacing: 3px;
            color: rgba(212, 168, 67, 0.8);
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="room">
        <header>
            <div class="logo">Record <span>Room</span></div>
            <div style="font-size:10px;letter-spacing:2px;color:rgba(212,168,67,0.4)">DRAG A RECORD TO PLAY</div>
        </header>

        <div class="main-area">
            <div class="shelf-section">
                <div class="shelf-label">— Your Collection —</div>
                <div class="shelf" id="shelf"></div>
                <div class="drag-hint">↑ drag to turntable ↑</div>
            </div>

            <div class="player-section">
                <div class="drop-zone" id="dropZone" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)"
                    ondrop="onDrop(event)">

                    <div class="turntable-body">
                        <div class="screw" style="top:14px;left:14px"></div>
                        <div class="screw" style="top:14px;right:14px"></div>
                        <div class="screw" style="bottom:14px;left:14px"></div>
                        <div class="screw" style="bottom:14px;right:14px"></div>

                        <div class="platter" id="platter">
                            <div class="spindle"></div>
                            <div class="vinyl-on-platter" id="vinylOnPlatter"></div>
                        </div>

                        <div class="empty-platter-text" id="emptyState">
                            <div class="arrow">⊙</div>
                            <p>DROP VINYL HERE</p>
                        </div>

                        <div class="tonearm-container arm-idle" id="tonearm">
                            <svg viewBox="0 0 80 200" fill="none" xmlns="http://www.w3.org/2000/svg"
                                style="width:100%;height:100%">
                                <circle cx="64" cy="18" r="11" fill="#3a3a3a" stroke="#555" stroke-width="1" />
                                <circle cx="64" cy="18" r="5" fill="#666" stroke="#888" stroke-width="0.5" />
                                <path d="M 64 28 Q 40 80 18 170" stroke="#8a8a8a" stroke-width="5"
                                    stroke-linecap="round" fill="none" />
                                <path d="M 64 28 Q 40 80 18 170" stroke="#aaa" stroke-width="2" stroke-linecap="round"
                                    fill="none" />
                                <line x1="18" y1="170" x2="8" y2="185" stroke="#777" stroke-width="3"
                                    stroke-linecap="round" />
                                <circle cx="8" cy="186" r="3" fill="#c0392b" />
                            </svg>
                        </div>

                        <div class="speed-badge">
                            <button class="speed-btn active" onclick="setSpeed(33)">33⅓</button>
                            <button class="speed-btn" onclick="setSpeed(45)">45</button>
                        </div>

                        <div class="drop-overlay">
                            <div class="drop-overlay-text">Release to Play</div>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <div class="now-playing">
                        <div>
                            <div class="np-label">Now Playing</div>
                            <div class="np-title" id="npTitle">— No Record Loaded —</div>
                            <div class="np-artist" id="npArtist">Drop a record onto the turntable</div>
                        </div>
                        <div class="np-badge" id="npBadge">IDLE</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width:0%"></div>
                    </div>
                    <div class="time-row">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">—:——</span>
                    </div>
                    <div class="playback-row">
                        <button class="ctrl-btn" id="prevBtn" onclick="prevTrack()" disabled title="Previous">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z" />
                            </svg>
                        </button>
                        <button class="ctrl-btn primary" id="playBtn" onclick="togglePlay()" disabled>▶</button>
                        <button class="ctrl-btn" id="nextBtn" onclick="nextTrack()" disabled title="Next">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M16 6h2v12h-2V6zM6 18l8.5-6L6 6v12z" />
                            </svg>
                        </button>
                    </div>
                    <div class="vol-row">
                        <span class="vol-label">VOL</span>
                        <input type="range" class="vol-slider" min="0" max="100" value="75"
                            oninput="setVolume(this.value)">
                        <span style="font-size:9px;color:rgba(212,168,67,0.4);width:24px;text-align:right"
                            id="volVal">75</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const songs = [
            { id: 0, title: "Velvet Midnight", artist: "The Wax Collective", duration: 214, labelColor: "#c0392b", grooveColor: "#1a0a0a" },
            { id: 1, title: "Golden Frequencies", artist: "Analog Dreams", duration: 187, labelColor: "#d4a843", grooveColor: "#0d0802" },
            { id: 2, title: "Smoke & Static", artist: "Reel to Reel", duration: 253, labelColor: "#2c7873", grooveColor: "#020d0c" },
            { id: 3, title: "Room 33", artist: "The Platterhouse", duration: 198, labelColor: "#7d3c98", grooveColor: "#0a0212" },
            { id: 4, title: "Autumn Pressed", artist: "Sunday Vinyl", duration: 231, labelColor: "#784212", grooveColor: "#0d0602" },
        ];

        // ── To add real audio, add an audioUrl field to each song above, e.g.:
        // { id:0, title:"Velvet Midnight", ..., audioUrl:"./tracks/velvet-midnight.mp3" }
        // The player will automatically use it if present.

        let currentSong = null;
        let isPlaying = false;
        let progress = 0;
        let progressInterval = null;
        let audioCtx = null;
        let gainNode = null;
        let oscillators = [];
        let audioElement = null;
        let volume = 0.75;
        let dragSongId = null;

        function makeVinylSVG(song, size = 200) {
            const s = size, cx = s / 2, cy = s / 2, r = s / 2 - 2;
            const rings = Array.from({ length: 18 }, (_, i) => `<circle cx="${cx}" cy="${cy}" r="${r * (0.48 + i * 0.025)}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.8"/>`).join('');
            const labelR = r * 0.28;
            return `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="rg${song.id}" cx="40%" cy="35%"><stop offset="0%" stop-color="rgba(255,255,255,0.07)"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="${song.grooveColor}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="url(#rg${song.id})"/>
    ${rings}
    <circle cx="${cx}" cy="${cy}" r="${labelR}" fill="${song.labelColor}"/>
    <circle cx="${cx}" cy="${cy}" r="${labelR * 0.85}" fill="${song.labelColor}" opacity="0.7"/>
    <text x="${cx}" y="${cy - 6}" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="${s * 0.045}" font-family="Playfair Display,serif" font-weight="700">${song.title.split(' ')[0]}</text>
    <text x="${cx}" y="${cy + 8}" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="${s * 0.032}" font-family="DM Mono,monospace">${song.artist.split(' ').slice(-1)[0]}</text>
    <circle cx="${cx}" cy="${cy}" r="${s * 0.025}" fill="#111"/>
    <circle cx="${cx}" cy="${cy}" r="${s * 0.012}" fill="#333"/>
  </svg>`;
        }

        function buildShelf() {
            const shelf = document.getElementById('shelf');
            songs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'record-card';
                card.draggable = true;
                card.dataset.id = song.id;
                card.innerHTML = `
      <div class="mini-vinyl">${makeVinylSVG(song, 42)}</div>
      <div class="card-info">
        <div class="card-title">${song.title}</div>
        <div class="card-artist">${song.artist}</div>
      </div>
      <div class="card-duration">${fmt(song.duration)}</div>`;
                card.addEventListener('dragstart', e => {
                    dragSongId = song.id;
                    card.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'copy';
                });
                card.addEventListener('dragend', () => card.classList.remove('dragging'));
                shelf.appendChild(card);
            });
        }

        function onDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            document.getElementById('dropZone').classList.add('drag-over');
        }

        function onDragLeave(e) {
            if (!e.currentTarget.contains(e.relatedTarget))
                document.getElementById('dropZone').classList.remove('drag-over');
        }

        function onDrop(e) {
            e.preventDefault();
            document.getElementById('dropZone').classList.remove('drag-over');
            if (dragSongId === null) return;
            loadSong(songs[dragSongId]);
            dragSongId = null;
        }

        function loadSong(song) {
            stopPlayback();
            currentSong = song;
            progress = 0;
            document.getElementById('dropZone').classList.add('has-record');
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('vinylOnPlatter').innerHTML = makeVinylSVG(song, 300);
            document.getElementById('npTitle').textContent = song.title;
            document.getElementById('npArtist').textContent = song.artist;
            document.getElementById('totalTime').textContent = fmt(song.duration);
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('currentTime').textContent = '0:00';
            document.getElementById('playBtn').disabled = false;
            document.getElementById('prevBtn').disabled = false;
            document.getElementById('nextBtn').disabled = false;
            document.querySelectorAll('.record-card').forEach(c =>
                c.classList.toggle('playing-card', parseInt(c.dataset.id) === song.id));
            startPlayback();
        }

        function startPlayback() {
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸';
            document.getElementById('npBadge').textContent = '● PLAYING';
            document.getElementById('npBadge').classList.add('playing');
            document.getElementById('vinylOnPlatter').classList.add('spinning');
            document.getElementById('tonearm').classList.remove('arm-idle');
            document.getElementById('tonearm').classList.add('arm-playing');

            if (currentSong.audioUrl) {
                if (!audioElement) { audioElement = new Audio(); audioElement.volume = volume; }
                audioElement.src = currentSong.audioUrl;
                audioElement.play().catch(() => { });
                audioElement.ontimeupdate = () => {
                    progress = Math.floor(audioElement.currentTime);
                    const pct = (progress / currentSong.duration) * 100;
                    document.getElementById('progressFill').style.width = pct + '%';
                    document.getElementById('currentTime').textContent = fmt(progress);
                };
                audioElement.onended = () => stopPlayback();
            } else {
                startAmbientAudio();
                clearInterval(progressInterval);
                progressInterval = setInterval(() => {
                    if (!isPlaying || !currentSong) return;
                    progress++;
                    if (progress >= currentSong.duration) { stopPlayback(); return; }
                    document.getElementById('progressFill').style.width = ((progress / currentSong.duration) * 100) + '%';
                    document.getElementById('currentTime').textContent = fmt(progress);
                }, 1000);
            }
        }

        function stopPlayback() {
            isPlaying = false;
            clearInterval(progressInterval);
            document.getElementById('playBtn').textContent = '▶';
            document.getElementById('npBadge').textContent = 'PAUSED';
            document.getElementById('npBadge').classList.remove('playing');
            document.getElementById('vinylOnPlatter').classList.remove('spinning');
            document.getElementById('tonearm').classList.add('arm-idle');
            document.getElementById('tonearm').classList.remove('arm-playing');
            if (audioElement) { audioElement.pause(); }
            stopAmbientAudio();
        }

        function togglePlay() {
            if (!currentSong) return;
            isPlaying ? stopPlayback() : startPlayback();
        }

        function prevTrack() {
            if (!currentSong) return;
            const idx = songs.findIndex(s => s.id === currentSong.id);
            loadSong(songs[(idx - 1 + songs.length) % songs.length]);
        }

        function nextTrack() {
            if (!currentSong) return;
            const idx = songs.findIndex(s => s.id === currentSong.id);
            loadSong(songs[(idx + 1) % songs.length]);
        }

        function setSpeed(s) {
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(s)));
            document.getElementById('vinylOnPlatter').style.animationDuration = s === 45 ? '1.33s' : '2s';
        }

        function setVolume(v) {
            volume = v / 100;
            document.getElementById('volVal').textContent = v;
            if (gainNode) gainNode.gain.setTargetAtTime(volume * 0.08, audioCtx.currentTime, 0.05);
            if (audioElement) audioElement.volume = volume;
        }

        function fmt(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

        function startAmbientAudio() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                stopAmbientAudio();
                gainNode = audioCtx.createGain();
                gainNode.gain.value = volume * 0.08;
                gainNode.connect(audioCtx.destination);
                const notes = [currentSong.id * 30 + 130, currentSong.id * 30 + 196, currentSong.id * 30 + 261];
                oscillators = notes.map((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    osc.type = i === 0 ? 'sine' : 'triangle';
                    osc.frequency.value = freq;
                    osc.connect(gainNode);
                    osc.start();
                    return osc;
                });
            } catch (e) { }
        }

        function stopAmbientAudio() {
            oscillators.forEach(o => { try { o.stop(); o.disconnect(); } catch (e) { } });
            oscillators = [];
            if (gainNode) { try { gainNode.disconnect(); } catch (e) { } gainNode = null; }
        }

        buildShelf();
    </script>
</body>

</html>
