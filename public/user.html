<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Record Room — Browse your album collection mounted on the wall like a real record room.">
  <title>Record Room — Collection</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💿</text></svg>">
</head>
<body class="room-page">
  <!-- Page Loader -->
  <div class="page-loader" id="page-loader">
    <div class="spinner" style="width:48px;height:48px;border-width:4px;"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="navbar-brand">Record <span>Room</span></div>
    <div class="navbar-search">
      <div class="search-box">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search albums, artists..." autocomplete="off">
        <button class="search-clear" id="search-clear" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="navbar-actions">
      <div class="theme-selector">
        <button class="theme-btn" id="theme-btn" title="Change Wall Theme">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
          </svg>
        </button>
        <div class="theme-dropdown" id="theme-dropdown">
          <div class="theme-option" data-theme="classic">
            <div class="theme-preview theme-preview-classic"></div>
            <span>Classic Warm</span>
          </div>
          <div class="theme-option" data-theme="dark">
            <div class="theme-preview theme-preview-dark"></div>
            <span>Dark Night</span>
          </div>
          <div class="theme-option" data-theme="gallery">
            <div class="theme-preview theme-preview-gallery"></div>
            <span>White Gallery</span>
          </div>
          <div class="theme-option" data-theme="glass">
            <div class="theme-preview theme-preview-glass"></div>
            <span>Modern Glass</span>
          </div>
          <div class="theme-option" data-theme="midnight">
            <div class="theme-preview theme-preview-midnight"></div>
            <span>Midnight Neon</span>
          </div>
          <div class="theme-option" data-theme="royal">
            <div class="theme-preview theme-preview-royal"></div>
            <span>Royal Velvet</span>
          </div>
          <div class="theme-option" data-theme="golden">
            <div class="theme-preview theme-preview-golden"></div>
            <span>Golden Hour</span>
          </div>
          <div class="theme-option" data-theme="forest">
            <div class="theme-preview theme-preview-forest"></div>
            <span>Forest Mist</span>
          </div>
          <div class="theme-option" data-theme="brick">
            <div class="theme-preview theme-preview-brick"></div>
            <span>Brick Wall</span>
          </div>
          <div class="theme-option" data-theme="concrete">
            <div class="theme-preview theme-preview-concrete"></div>
            <span>Concrete</span>
          </div>
          <div class="theme-option" data-theme="foryou">
            <div class="theme-preview theme-preview-foryou"></div>
            <span>For You</span>
          </div>
        </div>
      </div>
      <div class="navbar-user">Welcome, <strong id="user-display-name">User</strong></div>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- The Room -->
  <div class="room-container" id="room-container">
    <!-- Wall texture background -->
    <div class="wall-surface"></div>

    <!-- Wall Viewport (clips the sliding walls) -->
    <div class="wall-viewport">
      <!-- Wall label -->
      <div class="wall-label" id="wall-label">Wall 1</div>

      <!-- Slider containing all wall pages -->
      <div class="wall-slider" id="wall-slider">
        <!-- Wall pages rendered dynamically by JS -->
      </div>
    </div>

    <!-- Navigation Arrows -->
    <button class="wall-nav-btn wall-nav-prev" id="wall-prev" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="wall-nav-btn wall-nav-next" id="wall-next" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 6 15 12 9 18"/></svg>
    </button>

    <!-- Wall Indicator Dots -->
    <div class="wall-indicators" id="wall-indicators">
      <!-- Dots rendered dynamically -->
    </div>

    <!-- Wooden Floor / Desk -->
    <div class="room-floor" id="room-floor"></div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/user.js"></script>
</body>
</html>
